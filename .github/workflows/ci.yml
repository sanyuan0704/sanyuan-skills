name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Byte-compile helper scripts
        run: python -m compileall skills/skill-forge/scripts

      - name: Validate all skills
        run: |
          for dir in skills/*; do
            if [ -d "$dir" ]; then
              echo "Validating $dir"
              python skills/skill-forge/scripts/quick_validate.py "$dir"
            fi
          done
